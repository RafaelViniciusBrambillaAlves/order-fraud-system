services:

  # =====================
  # ORDER SERVICE (.NET)
  # =====================
  order-service:
    build: ./order-service
    # ports:
    #   - "5001:80"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./order-service/.env
    networks:
      - microservices-network
    labels:
      - "traefik.enable=true"

      # API
      - "traefik.http.routers.order.rule=PathPrefix(`/api/orders`)"
      - "traefik.http.routers.order.entrypoints=web"
      - "traefik.http.services.order.loadbalancer.server.port=80"

      # SWAGGER
      - "traefik.http.routers.order-swagger.rule=PathPrefix(`/order/swagger`)"
      - "traefik.http.routers.order-swagger.entrypoints=web"

      - "traefik.http.routers.order-swagger.middlewares=order-swagger-rewrite"

      - "traefik.http.middlewares.order-swagger-rewrite.replacepathregex.regex=^/order/swagger(.*)"
      - "traefik.http.middlewares.order-swagger-rewrite.replacepathregex.replacement=/swagger$$1"

      - "traefik.http.routers.order-swagger.service=order"

  # =====================
  # FRAUD SERVICE (FASTAPI)
  # =====================
  fraud-service:
    build: ./fraud-service
    ports:
     - "8088:8088"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy 
    env_file:
      - ./fraud-service/.env
    networks:
      - microservices-network
    labels:
      - "traefik.enable=true"

      # API
      - "traefik.http.routers.fraud.rule=PathPrefix(`/api/fraud`)"
      - "traefik.http.routers.fraud.entrypoints=web"
      - "traefik.http.services.fraud.loadbalancer.server.port=8000"
      - "traefik.http.routers.fraud.middlewares=fraud-strip"
      - "traefik.http.middlewares.fraud-strip.stripprefix.prefixes=/fraud"
      
      # DOCS
      - "traefik.http.routers.fraud-ui.rule=PathPrefix(`/fraud`)"
      - "traefik.http.routers.fraud-ui.entrypoints=web"
      - "traefik.http.routers.fraud-ui.middlewares=fraud-strip"
      - "traefik.http.routers.fraud-ui.service=fraud"

  # =====================
  # SQL SERVER
  # =====================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -Q 'SELECT 1' -No -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - microservices-network

  # =====================
  # MONGODB
  # =====================
  mongodb:
    image: mongo:6.0.15
    command: ["bash", "/mongo-init.sh"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongodb/mongo-init.sh:/mongo-init.sh
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "rs.isMaster().ismaster || quit(1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - microservices-network
      
  # =====================
  # RABBITMQ
  # =====================
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"   # comunicação entre serviços
      - "15672:15672" # interface web
    volumes:
    - rabbitmq_data:/var/lib/rabbitmq 
    - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - microservices-network

  # =====================
  # DBGATE (SQL UI PROFISSIONAL)
  # =====================
  dbgate:
    image: dbgate/dbgate
    ports:
      - "3000:3000"
    volumes:
      - dbgate_data:/root/.dbgate

  # =====================
  # TRAEFIK API GATEWAY
  # =====================
  traefik:
    image: traefik:v3.0
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"

    ports:
      - "80:80"
      - "8080:8080"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

    networks:
      - microservices-network

  # =====================
  # OTEL COLLECTOR
  # =====================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    command: ["--config=/etc/otel/config.yml"]
    volumes:
      - ./observability/otel-collector.yml:/etc/otel/config.yml:ro
    ports:
      - "4317:4317"   
      - "4318:4318"   
      - "8889:8889"   
    depends_on:
      - jaeger
      - prometheus
    networks:
      - microservices-network

  # =====================
  # JAEGER
  # =====================
  jaeger:
    image: jaegertracing/all-in-one:1.56
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "14250:14250" 
    networks:
      - microservices-network
  
  # =====================
  # PROMETHEUS
  # =====================
  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090" 
    networks:
      - microservices-network

  # =====================
  # GRAFANA
  # =====================
  grafana:
    image: grafana/grafana:10.4.0
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
      - jaeger
    networks:
      - microservices-network

  # =====================
  # LOKI (log aggregation)
  # =====================
  loki:
    image: grafana/loki:3.0.0
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - microservices-network

  # =====================
  # PROMTAIL (log shipper)
  # =====================
  promtail:
    image: grafana/promtail:3.0.0
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      # Precisa ler o socket do Docker para descobrir containers
      - /var/run/docker.sock:/var/run/docker.sock:ro
      # Persiste posições para não re-enviar logs após restart
      - promtail_positions:/tmp
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - microservices-network

volumes:
  sql_data:
  mongo_data:
  dbgate_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  loki_data:
  promtail_positions:

networks:
  microservices-network:
    driver: bridge