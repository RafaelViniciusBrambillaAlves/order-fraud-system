services:

  # =====================
  # ORDER SERVICE (.NET)
  # =====================
  order-service:
    build: ./order-service
    ports:
      - "5001:80"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - ./order-service/.env

  # =====================
  # FRAUD SERVICE (FASTAPI)
  # =====================
  fraud-service:
    build: ./fraud-service
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy 
    env_file:
      - ./fraud-service/.env

  # =====================
  # SQL SERVER
  # =====================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "YourStrong!Passw0rd"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Passw0rd' -Q 'SELECT 1' -No -C || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # =====================
  # MONGODB
  # =====================
  mongodb:
    image: mongo:6
    command: ["bash", "/mongo-init.sh"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongodb/mongo-init.sh:/mongo-init.sh
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "rs.isMaster().ismaster || quit(1)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
      

  # =====================
  # RABBITMQ
  # =====================
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"   # comunicação entre serviços
      - "15672:15672" # interface web
    volumes:
    - rabbitmq_data:/var/lib/rabbitmq 
    - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # =====================
  # DBGATE (SQL UI PROFISSIONAL)
  # =====================
  dbgate:
    image: dbgate/dbgate
    ports:
      - "3000:3000"
    volumes:
      - dbgate_data:/root/.dbgate

volumes:
  sql_data:
  mongo_data:
  dbgate_data:
  rabbitmq_data: