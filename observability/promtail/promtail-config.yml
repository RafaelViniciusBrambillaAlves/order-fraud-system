server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    # Retry automático em caso de falha
    backoff_config:
      min_period: 500ms
      max_period: 5m
      max_retries: 10

scrape_configs:
  # order-service (.NET) 
  - job_name: order-service
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["order-service"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
      - target_label: service
        replacement: order-service
      - target_label: env
        replacement: development
    pipeline_stages:
      # Parseia JSON estruturado emitido pelo .NET
      - json:
          expressions:
            level: level
            message: message
            traceId: TraceId
            spanId: SpanId
            sourceContext: SourceContext
      # Promove level para label (permite filtrar {level="error"})
      - labels:
          level:
          service:
      # Descarta logs de health check para não poluir
      - drop:
          expression: '.*\/health.*'
      # Formata o timestamp corretamente
      - timestamp:
          source: timestamp
          format: RFC3339

  # fraud-service (Python / uvicorn) 
  - job_name: fraud-service
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["fraud-service"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
      - target_label: service
        replacement: fraud-service
      - target_label: env
        replacement: development
    pipeline_stages:
      - json:
          expressions:
            level: levelname
            message: message
            traceId: otelTraceID
            spanId: otelSpanID
      - labels:
          level:
          service:
      - drop:
          expression: '.*\/health.*'

  # infra (rabbitmq, mongodb, sqlserver)
  - job_name: infra
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["rabbitmq", "mongodb", "sqlserver"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
      - source_labels: [__meta_docker_container_name]
        regex: "/([^-]+).*"
        target_label: service
      - target_label: env
        replacement: development
    pipeline_stages:
      - labels:
          service: